    <text x="1325" y="445" text-anchor="middle" class="sub">Обработка заявок,</text>
    <text x="1325" y="472" text-anchor="middle" class="sub">поддержка и контроль</text>
  </g>

  <g opacity="0.95">
    <path d="M440 335H585" stroke="#2A66D4" stroke-width="8" stroke-linecap="round"/>
    <path d="M560 312L600 335L560 358" stroke="#2A66D4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M970 335H1115" stroke="#2A66D4" stroke-width="8" stroke-linecap="round"/>
    <path d="M1090 312L1130 335L1090 358" stroke="#2A66D4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="200" y="620" rx="24" ry="24" width="320" height="100" fill="#F6FAFF" stroke="#CFE0FB" stroke-width="3"/>
    <rect x="640" y="620" rx="24" ry="24" width="320" height="100" fill="#F6FAFF" stroke="#CFE0FB" stroke-width="3"/>
    <rect x="1080" y="620" rx="24" ry="24" width="320" height="100" fill="#F6FAFF" stroke="#CFE0FB" stroke-width="3"/>
  </g>

  <g>
    <circle cx="255" cy="670" r="22" fill="#DCEBFF"/>
    <path d="M247 670L254 677L266 663" stroke="#1D62D2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="360" y="678" text-anchor="middle" class="chip">Быстрый доступ</text>
  </g>

  <g>
    <circle cx="695" cy="670" r="22" fill="#DCEBFF"/>
    <path d="M684 661H706V679H684V661Z" stroke="#1D62D2" stroke-width="4" fill="none"/>
    <path d="M691 655H699" stroke="#1D62D2" stroke-width="4" stroke-linecap="round"/>
    <text x="800" y="678" text-anchor="middle" class="chip">Обработка заявок</text>
  </g>

  <g>
    <circle cx="1135" cy="670" r="22" fill="#DCEBFF"/>
    <path d="M1124 673V664C1124 657 1129 652 1135 652C1141 652 1146 657 1146 664V673" stroke="#1D62D2" stroke-width="4" stroke-linecap="round"/>
