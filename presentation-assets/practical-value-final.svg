    <path d="M106 524C106 505 121 490 140 490H160C179 490 194 505 194 524C194 532 188 538 180 538H165L150 552V538H120C112 538 106 532 106 524Z" fill="#1669E7"/>
    <circle cx="132" cy="520" r="4" fill="#FFFFFF"/>
