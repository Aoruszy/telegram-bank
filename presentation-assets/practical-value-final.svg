    <circle cx="1305" cy="817" r="22" fill="#EAF2FF"/>
    <path d="M1293 817H1317" stroke="#1669E7" stroke-width="5" stroke-linecap="round"/>
    <path d="M1305 805V829" stroke="#1669E7" stroke-width="5" stroke-linecap="round"/>
