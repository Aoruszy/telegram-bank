    <rect x="108" y="360" width="44" height="62" rx="8" fill="#1669E7"/>
    <rect x="117" y="371" width="26" height="35" rx="3" fill="#FFFFFF"/>
    <circle cx="130" cy="414" r="4" fill="#FFFFFF"/>
