  <path d="M800 500V610" stroke="#115FD3" stroke-width="4" stroke-linecap="round"/>
  <path d="M786 594L800 610L814 594" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M800 610V735H272V770" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 610V735H655V770" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 610V735H1038V770" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 610V735H1376V770" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
