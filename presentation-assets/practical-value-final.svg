    <text x="800" y="430" text-anchor="middle" class="center-sub">Цифровой канал обслуживания клиентов</text>
    <line x1="655" y1="448" x2="945" y2="448" stroke="#D8E7FF" stroke-width="2" opacity="0.8"/>
    <text x="800" y="482" text-anchor="middle" class="center-text">Ускорение клиентских сценариев, обработка заявок,</text>
    <text x="800" y="512" text-anchor="middle" class="center-text">разгрузка поддержки и повышение прозрачности</text>
  </g>

