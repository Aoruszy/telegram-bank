    <text x="581" y="834" class="benefit-text">заявок и сервисных запросов</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="878" y="770" width="320" height="95" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <circle cx="926" cy="817" r="22" fill="#EAF2FF"/>
    <path d="M916 822V810C916 803 920 799 926 799C932 799 936 803 936 810V822" stroke="#1669E7" stroke-width="4.5" stroke-linecap="round"/>
