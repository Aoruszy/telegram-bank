<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1467E8"/>
      <stop offset="100%" stop-color="#0A3887"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#AFCBFF" flood-opacity="0.8"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#183D82" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #102D62; }
      .head-light { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .head-dark { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .card-title { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #152F61; }
      .card-text { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #27416E; }
      .center-title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .center-sub { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #EAF3FF; }
      .center-text { font: 400 22px 'Segoe UI', Arial, sans-serif; fill: #EAF3FF; }
      .benefit-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #174A9B; }
      .benefit-text { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #27416E; }
    </style>
  </defs>

  <text x="800" y="78" text-anchor="middle" class="title">Практическая ценность проекта для банка</text>

  <!-- Top users -->
  <g filter="url(#cardShadow)">
    <rect x="92" y="125" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <path d="M92 143C92 133.059 100.059 125 110 125H374C383.941 125 392 133.059 392 143V190H92V143Z" fill="#115FD3"/>
    <text x="242" y="168" text-anchor="middle" class="head-light">Клиенты</text>
    <circle cx="242" cy="226" r="18" fill="#115FD3"/>
    <path d="M210 262C216 242 230 232 242 232C254 232 268 242 274 262" fill="#115FD3"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1208" y="125" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#0F2D63" stroke-width="3"/>
    <path d="M1208 143C1208 133.059 1216.06 125 1226 125H1490C1499.94 125 1508 133.059 1508 143V190H1208V143Z" fill="#0F2D63"/>
    <text x="1358" y="168" text-anchor="middle" class="head-dark">Банк</text>
    <circle cx="1358" cy="222" r="18" fill="#0F2D63"/>
    <path d="M1326 262C1332 242 1346 232 1358 232C1370 232 1384 242 1390 262" fill="#0F2D63"/>
    <rect x="1348" y="246" width="20" height="18" fill="#FFFFFF"/>
    <path d="M1358 233L1371 245H1345L1358 233Z" fill="#FFFFFF"/>
