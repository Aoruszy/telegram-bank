    <path d="M785 310H815L822 293H778L785 310Z" fill="#FFFFFF"/>
    <rect x="776" y="310" width="48" height="38" rx="8" fill="#FFFFFF"/>
    <rect x="768" y="348" width="64" height="8" rx="4" fill="#FFFFFF"/>
