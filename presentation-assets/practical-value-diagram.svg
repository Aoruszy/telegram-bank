<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="mainCard" x1="540" y1="210" x2="1080" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F66E9"/>
      <stop offset="1" stop-color="#0B3A88"/>
    </linearGradient>
    <linearGradient id="headerBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#156AE8"/>
      <stop offset="1" stop-color="#0F4FB8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0C357B" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.82 0 1 0 0 0.9 0 0 1 0 1 0 0 0 0.65 0"/>
    </filter>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0F2B5D; }
      .card-head { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .card-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #142E61; }
      .card-text { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #213D71; }
      .main-title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .main-sub { font: 600 26px 'Segoe UI', Arial, sans-serif; fill: #EAF3FF; }
      .main-text { font: 400 21px 'Segoe UI', Arial, sans-serif; fill: #EAF3FF; }
      .bottom-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #11459B; }
      .bottom-text { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #2A4775; }
    </style>
  </defs>

  <ellipse cx="805" cy="220" rx="520" ry="110" fill="#E8F2FF" filter="url(#glow)" opacity="0.55"/>

  <text x="800" y="88" text-anchor="middle" class="title">Практическая ценность проекта для банка</text>

  <!-- Top actors -->
  <g filter="url(#shadow)">
    <rect x="82" y="136" width="300" height="156" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <rect x="82" y="136" width="300" height="56" rx="18" fill="url(#headerBlue)"/>
    <rect x="82" y="174" width="300" height="18" fill="url(#headerBlue)"/>
    <text x="232" y="172" text-anchor="middle" class="card-head">Клиент банка</text>
    <circle cx="232" cy="232" r="18" fill="#165DCE"/>
    <path d="M200 272C206 250 221 239 232 239C243 239 258 250 264 272" fill="#165DCE"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1218" y="136" width="300" height="156" rx="18" fill="#FFFFFF" stroke="#0F2F67" stroke-width="3"/>
    <rect x="1218" y="136" width="300" height="56" rx="18" fill="#0F2F67"/>
    <rect x="1218" y="174" width="300" height="18" fill="#0F2F67"/>
    <text x="1368" y="172" text-anchor="middle" class="card-head">Сотрудник банка</text>
    <circle cx="1368" cy="228" r="18" fill="#0F2F67"/>
    <path d="M1336 272C1342 250 1357 239 1368 239C1379 239 1394 250 1400 272" fill="#0F2F67"/>
    <rect x="1357" y="252" width="22" height="30" fill="#FFFFFF"/>
    <path d="M1368 236L1383 248H1353L1368 236Z" fill="#FFFFFF"/>
  </g>

