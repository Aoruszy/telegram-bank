  <g filter="url(#shadow)">
    <rect x="88" y="344" width="350" height="136" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <rect x="108" y="380" width="56" height="72" rx="10" fill="#156AE8"/>
    <rect x="121" y="394" width="30" height="42" rx="4" fill="#FFFFFF"/>
    <circle cx="136" cy="444" r="5" fill="#FFFFFF"/>
