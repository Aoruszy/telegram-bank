  <path d="M784 554L800 572L816 554" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 686V716H266V736" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 686V716H660V736" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 686V716H1054V736" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M800 686V716H1391V736" stroke="#115FD3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
