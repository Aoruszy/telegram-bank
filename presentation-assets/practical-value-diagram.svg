    <text x="986" y="810" class="bottom-text">Роли, аудит и централизованное</text>
    <text x="986" y="834" class="bottom-text">управление доступом</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1268" y="736" width="246" height="112" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <circle cx="1320" cy="792" r="30" fill="#EAF2FF"/>
    <path d="M1305 789H1335" stroke="#156AE8" stroke-width="6" stroke-linecap="round"/>
    <path d="M1320 774V804" stroke="#156AE8" stroke-width="6" stroke-linecap="round"/>
    <text x="1391" y="782" text-anchor="middle" class="bottom-title">Масштабирование</text>
    <text x="1391" y="810" text-anchor="middle" class="bottom-text">Основа для дальнейшего</text>
    <text x="1391" y="834" text-anchor="middle" class="bottom-text">развития цифрового канала</text>
  </g>

