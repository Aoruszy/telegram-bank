    <text x="592" y="810" class="bottom-text">Автоматизация маршрутов снижает</text>
    <text x="592" y="834" class="bottom-text">время реакции сотрудников</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="874" y="736" width="360" height="112" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <circle cx="936" cy="792" r="30" fill="#EAF2FF"/>
    <path d="M923 798V783C923 775 929 769 936 769C943 769 949 775 949 783V798" stroke="#156AE8" stroke-width="5" stroke-linecap="round"/>
    <rect x="924" y="795" width="24" height="18" rx="5" fill="#156AE8"/>
