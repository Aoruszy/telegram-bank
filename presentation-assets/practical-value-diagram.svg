    <line x1="650" y1="446" x2="950" y2="446" stroke="#D8E7FF" stroke-width="2" opacity="0.7"/>
    <text x="800" y="487" text-anchor="middle" class="main-text">Дополнительный цифровой канал обслуживания,</text>
