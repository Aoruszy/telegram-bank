    <text x="1260" y="488" class="card-text">Обработка заявок, сервисных</text>
    <text x="1260" y="514" class="card-text">запросов, ролей сотрудников</text>
    <text x="1260" y="540" class="card-text">и контроль действий</text>
  </g>

