  <g filter="url(#shadow)">
    <rect x="86" y="736" width="360" height="112" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <circle cx="148" cy="792" r="30" fill="#EAF2FF"/>
    <path d="M132 792H164" stroke="#156AE8" stroke-width="6" stroke-linecap="round"/>
    <path d="M148 776V808" stroke="#156AE8" stroke-width="6" stroke-linecap="round"/>
