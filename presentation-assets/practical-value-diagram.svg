    <text x="190" y="420" class="card-text">Быстрый доступ клиентов</text>
    <text x="190" y="446" class="card-text">к банковским сервисам</text>
    <text x="190" y="472" class="card-text">без отдельного приложения</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="500" width="350" height="136" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <path d="M106 560C106 538 124 522 146 522H164C186 522 204 538 204 560C204 568 198 574 190 574H172L154 590V574H120C112 574 106 568 106 560Z" fill="#156AE8"/>
    <circle cx="134" cy="548" r="5" fill="#FFFFFF"/>
    <circle cx="154" cy="548" r="5" fill="#FFFFFF"/>
    <circle cx="174" cy="548" r="5" fill="#FFFFFF"/>
    <text x="224" y="546" class="card-title">VK-бот</text>
    <text x="224" y="576" class="card-text">Дополнительный канал</text>
    <text x="224" y="602" class="card-text">уведомлений и взаимодействия</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="656" width="350" height="136" rx="18" fill="#FFFFFF" stroke="#115FD3" stroke-width="3"/>
    <path d="M140 684C117 684 100 701 100 724C100 745 115 762 135 764L123 782L154 768C180 773 205 756 210 730C216 704 197 680 170 680C162 680 150 682 140 684Z" fill="#156AE8"/>
    <path d="M130 731C130 714 143 700 159 700C173 700 186 712 186 728C186 742 176 752 164 756" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M154 729C154 708 147 698 137 692" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <text x="224" y="702" class="card-title">AI-помощник</text>
    <text x="224" y="732" class="card-text">Автоматизация ответов</text>
    <text x="224" y="758" class="card-text">и разгрузка первой линии</text>
    <text x="224" y="784" class="card-text">поддержки</text>
  </g>

