    <circle cx="710" cy="635" r="26" fill="#FFFFFF"/>
    <ellipse cx="710" cy="620" rx="26" ry="10" fill="#0D2550"/>
    <path d="M684 620V650C684 658 696 665 710 665C724 665 736 658 736 650V620" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M684 635C684 643 696 650 710 650C724 650 736 643 736 635" stroke="#FFFFFF" stroke-width="4"/>
